# check if Cluster Health is good
- name: Check if cluster operators and nodes are healthy
  include_role:
    name: check-cluster-health

- name: Check if cso_namespace is defined, and set default if not
  set_fact:
     cso_namespace: "{{ cso_namespace | default('quay-registry') }}"  # Set default namespace if not defined

- name: Create a target namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ cso_namespace }}"
  when: cso_namespace is defined

# Custom ImageContentSourcePolicy and CatalogSource
- name: Create ImageContentSourcePolicy and CatalogSource
  block:
  - name: Include the global-secret-update role
    include_role:
      name: global-secret-update
    when: cso_enable_global_secret

  - name: Include role to create ImageContentSourcePolicy and CatalogSource
    include_role:
      name: set-custom-catalogsource
    vars:
      custom_catalogsource_name: "{{ cso_catalogsource_name }}"
      custom_catalogsource_display_name: "Custom CSO CatalogSource"
      custom_catalogsource_image: "{{ cso_catalogsource_image }}"
  when: cso_catalogsource_image | default('') | length > 0

- name: Use default CatalogSource if no custom image is provided
  set_fact:
    cso_catalogsource_name: "redhat-operators"
  when: cso_catalogsource_image | default('') | length == 0

- name: Verify creation of Catsrc
  shell: oc get catsrc -A | grep "{{ cso_catalogsource_name }}"
  register: catsrc
  until: catsrc.stdout|int == 0 and catsrc.stderr == ""
  retries: 10
  delay: 30

- name: Check if CSO CatalogSource exists and is READY
  shell: >
    oc get catalogsource {{ cso_catalogsource_name }} -n openshift-marketplace -o jsonpath='{.status.connectionState.lastObservedState}'
  register: cso_catsrc_check
  retries: 10
  delay: 15
  until: cso_catsrc_check.rc == 0
  changed_when: false
  failed_when: cso_catsrc_check.rc != 0

- name: Debug output for CSO CatalogSource check
  debug:
    msg: "CSO CatalogSource '{{ cso_catalogsource_name }}' is present and in Ready state."

- name: Copy and validate pull-secret
  block:
    - name: Copy pull-secret
      copy:
        src: "{{ cso_pull_secrets_path }}"
        dest: "/tmp/{{ cso_pull_secrets_path | basename }}"

    - name: Read pull-secret file
      set_fact:
        pull_secret_raw: "{{ lookup('file', '/tmp/' ~ (cso_pull_secrets_path | basename)) }}"

    - name: Fail if pull-secret is empty
      fail:
        msg: "Provided pull-secret file is empty"
      when:
        - pull_secret_raw | trim == ""

    - name: Validate pull-secret JSON
      set_fact:
        validated_pull_secret: >-
          {{
            pull_secret_raw
            if pull_secret_raw is mapping
            else pull_secret_raw | from_json
          }}
  when: cso_pull_secrets_path | default('') | length > 0

- name: Copy and validate ICSP
  block:
    - name: Copy icsp
      copy:
        src: "{{ cso_icsp_path }}"
        dest: "/tmp/{{ cso_icsp_path | basename }}"

    - name: Read icsp file
      set_fact:
        icsp_raw: "{{ lookup('file', '/tmp/' ~ (cso_icsp_path | basename)) }}"

    - name: Fail if icsp file is empty
      fail:
        msg: "Provided ICSP file is empty"
      when: icsp_raw | trim == ""

    - name: Validate ICSP YAML
      set_fact:
        validated_icsp: >-
          {{
            icsp_raw
            if icsp_raw is mapping
            else icsp_raw | from_yaml
          }}
  when: cso_icsp_path | default('') | length > 0

- name: merge existing and new pull secrets
  block:
    - name: Get existing pull-secret
      kubernetes.core.k8s_info:
        kind: Secret
        name: pull-secret
        namespace: openshift-config
      register: existing_secret

    - name: Decode existing pull-secret
      set_fact:
        existing_pull_secret_json: "{{ existing_secret.resources[0].data['.dockerconfigjson'] | b64decode }}"

    - name: Read new pull-secret file
      set_fact:
        new_pull_secret_json: "{{ lookup('file', '/tmp/{{ cso_pull_secrets_path | basename }}') }}"

    - name: Merge pull secrets
      set_fact:
        merged_pull_secret_json: >-
          {{
            (existing_pull_secret_json if existing_pull_secret_json is mapping else existing_pull_secret_json | from_json)
            | combine((new_pull_secret_json if new_pull_secret_json is mapping else new_pull_secret_json | from_json), recursive=True) | to_json
          }}

    - name: Update pull-secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: pull-secret
            namespace: openshift-config
          type: kubernetes.io/dockerconfigjson
          data:
            .dockerconfigjson: "{{ merged_pull_secret_json | b64encode }}"

- name: Wait 120 seconds to reconcile
  pause:
    seconds: 120
    prompt: "Waiting 120 seconds to reconcile..."

- name: Wait for MCP rollout
  shell: |
    oc get mcp -o json | jq -e '
      all(.items[].status.conditions[];
        if .type=="Updated" then .status=="True"
        elif .type=="Degraded" then .status=="False"
        elif .type=="Progressing" then .status=="False"
        else true end
      )'
  register: mcp_status
  retries: 30
  delay: 30
  until: mcp_status.rc == 0

- name: Create ImageContentSourcePolicy
  kubernetes.core.k8s:
    state: present
    src: "/tmp/{{ cso_icsp_path | basename }}"

- name: Wait 120 seconds for ImageContentSourcePolicy to reconcile
  pause:
    seconds: 120
    prompt: "Waiting 120 seconds for ImageContentSourcePolicy to reconcile..."

- name: Create OperatorGroup for CSO
  k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1
      kind: OperatorGroup
      metadata:
        name: container-security-operator-group
        namespace: "{{ cso_namespace }}"
      spec: {}

- name: Create CSO Operator Subscription
  k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: container-security-operator
        namespace: "{{ cso_namespace }}"
      spec:
        channel: "{{ cso_operator_channel }}"
        name: container-security-operator
        source: "{{ cso_catalogsource_name }}"
        sourceNamespace: openshift-marketplace
        installPlanApproval: Automatic

- name: Check if cso Operator CSV is in 'Succeeded' phase
  shell: |
    oc get csv -n {{ cso_namespace }} --no-headers | grep container-security-operator | grep Succeeded
  register: csv_status
  retries: 10
  delay: 30
  until: csv_status.stdout != "" and csv_status.stderr == ""
  failed_when: csv_status.rc != 0

- name: Debug container-security-operator CSV status
  debug:
    msg: "Container Security Operator CSV has successfully reached 'Succeeded' state."

